<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ask The Black Kids</title>

<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    background-color: #F5EFE7; /* beige */
    color: #1A1A1A;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
  }

  .container {
    max-width: 800px;
    padding: 20px;
  }

  .headline-small {
    font-size: 32px;
    font-weight: 400;
    font-style: italic;
    color: #6B4F3A; /* coffee brown */
  }

  .headline-main {
    font-size: 72px;
    font-weight: 800;
    line-height: 0.95;
    margin: 10px 0;
  }

  .highlight {
    color: #FF5FA2; /* pink accent */
  }

  .subtext {
    font-size: 18px;
    margin-top: 20px;
    color: #444;
  }

  .cta {
    margin-top: 40px;
  }

  .cta a {
    text-decoration: none;
    background-color: #1A1A1A;
    color: white;
    padding: 16px 28px;
    font-size: 18px;
    border-radius: 999px;
    transition: 0.2s ease;
  }

  .cta a:hover {
    background-color: #FF5FA2;
  }

  .note {
    margin-top: 12px;
    font-size: 14px;
    color: #666;
  }

</style>
</head>

<body>

<div class="container">

  <div class="headline-small">
    alright...
  </div>

  <div class="headline-main">
    ask the black kids <span class="highlight">your problem.</span>
  </div>

  <div class="subtext">
    Got a story? Need advice? Or just messy?
  </div>

  <div class="cta">
    <a href="YOUR_TALLY_LINK_HERE">Submit Your Story</a>
  </div>

  <div class="note">
    Anonymous or named. Voice notes hit different 🎤
  </div>

</div>

</body>
</html>
