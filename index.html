<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ask The Black Kids</title>

  <style>
    :root {
      --bg: #F5EFE7;
      --text: #1A1A1A;
      --muted: #6B6B6B;
      --accent: #FF5FA2;
      --accent-soft: #FFE4EF;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 520px;
      text-align: left;
    }

    .micro {
      font-size: 22px;
      font-style: italic;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .headline {
      font-size: 54px;
      line-height: 1;
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 20px;
    }

    .context {
      font-size: 16px;
      color: var(--muted);
      margin-bottom: 30px;
    }

    .cta {
      display: inline-block;
      text-decoration: none;
      background: var(--accent);
      color: white;
      padding: 16px 22px;
      border-radius: 999px;
      font-weight: 600;
      font-size: 16px;
      transition: 0.2s ease;
    }

    .cta:hover {
      background: #e64c8f;
    }

    .note {
      margin-top: 12px;
      font-size: 14px;
      color: var(--muted);
    }

    .footer {
      margin-top: 40px;
      font-size: 12px;
      color: #999;
    }

  </style>
</head>

<body>

  <div class="container">

    <div class="micro">what had happened was…</div>

    <div class="headline">
      tell us what happened.
    </div>

    <div class="context">
      real stories. real advice. featured on the podcast.
    </div>

    <a class="cta" href="YOUR_TALLY_LINK_HERE">
      submit your story
    </a>

    <div class="note">
      voice notes are more likely to be featured 🎤
    </div>

    <div class="footer">
      Only Black Kids in the Class
    </div>

  </div>

</body>
</html>
