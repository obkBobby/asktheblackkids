<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ask The Black Kids</title>

  <style>
    :root {
      --bg: #F5EFE7;
      --text: #1A1A1A;
      --muted: #6B6B6B;
      --accent: #FF5FA2;
      --accent-soft: #FFE4EF;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
      text-align: center;
    }

    .headline {
      font-size: clamp(40px, 9vw, 54px);
      line-height: 1;
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 20px;
      white-space: nowrap;
      overflow-wrap: normal;
    }

    .context {
      font-size: 16px;
      color: var(--muted);
      margin-bottom: 30px;
    }

    .cta {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      width: min(100%, 460px);
      text-decoration: none;
      background: var(--accent);
      color: white;
      padding: 22px 36px;
      border-radius: 999px;
      font-weight: 800;
      font-size: 24px;
      letter-spacing: 0.03em;
      box-shadow: 0 22px 40px rgba(255, 95, 162, 0.28);
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .cta:hover {
      background: #e64c8f;
    }

    .note {
      margin-top: 12px;
      font-size: 14px;
      color: var(--muted);
    }

    .footer {
      margin-top: 40px;
      font-size: 12px;
      color: #999;
      text-align: center;
    }

  </style>
</head>

<body>

  <div class="container">

    <div class="headline">
      what had happened was...
    </div>

    <a class="cta" href="YOUR_TALLY_LINK_HERE">
      share your story
    </a>

    <div class="footer">
      <a href="https://onlyblackkids.com/">Only Black Kids in the Class</a>
    </div>

  </div>

</body>
</html>
